apiVersion: observability.parseable.com/v1alpha1
kind: ParseableConfig
metadata:
  labels:
    app.kubernetes.io/name: pai
    app.kubernetes.io/managed-by: kustomize
  name: production-matchlabel
spec:
  namespaceSelector:
    mode: include
    namespaces:
      - demo

  # matchLabels: simple key=value equality
  # A workload must have ALL listed labels to match.
  # This example includes only the adservice deployment.
  workloadSelector:
    mode: include
    matchLabels:
      app: adservice

  target:
    endpoint: http://106.51.126.91:8010
    credentialsSecret:
      name: parseable-creds
      namespace: parseable-operator-system
    streams:
      traces: prod-traces-demo-new

  instrumentation:
    languages:
      - java
      - python
      - nodejs
      - dotnet
    detectionTimeout: "1m"
