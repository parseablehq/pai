apiVersion: observability.parseable.com/v1alpha1
kind: ParseableConfig
metadata:
  labels:
    app.kubernetes.io/name: pai
    app.kubernetes.io/managed-by: kustomize
  name: production
spec:
  target:
    endpoint: http://<YOUR_PARSEABLE_ENDPOINT>:8010
    credentialsSecret:
      name: parseable-creds
      namespace: parseable-operator-system

  traces:
    targetDataset: pai-traces-ds
    namespaceSelector:
      mode: include
      namespaces:
        - demo
    instrumentation:
      languages:
        - java
        - python
        - nodejs
        - dotnet
      detectionTimeout: "1m"

  logs:
    podLogs:
      enabled: true
      targetDataset: pai-logs
      namespaceSelector:
        mode: include
        namespaces:
          - demo
    files:
      - name: app audit logs
        hostPath: /var/log/app/audit
        targetDataset: pai-app-audit

  metrics:
    clusterMetrics:
      targetDataset: pai-cluster-metrics
      k8sCluster:
        enabled: true
        nodeConditions: [Ready, DiskPressure, MemoryPressure, PIDPressure, NetworkUnavailable]
        allocatableResources: [cpu, memory, storage]
      kubelet:
        enabled: true
      kubeState:
        enabled: true
    scrapeConfigs:
      - name: app metrics
        uri: /metrics
        port: 8080
        targetDataset: pai-app-metrics
        podSelector:
          app.kubernetes.io/name: my-app

  events:
    enabled: true
    targetDataset: pai-events
    namespaceSelector:
      mode: include
      namespaces:
        - demo
