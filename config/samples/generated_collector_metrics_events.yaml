# This is the OpenTelemetryCollector CR that PAI generates for the metrics+events Deployment.
# PAI translates spec.metrics + spec.events into one Deployment-mode collector with one pipeline
# per ScrapeConfigs[] entry, one pipeline for cluster object state (when ClusterMetrics is enabled),
# and one pipeline for Kubernetes events (when Events is enabled).
#
# Note: kubeletstats for pod+node resource metrics lives in the log DaemonSet instead, because each
# kubelet only exposes its own node. Both kubeletstats and k8s_cluster ship to the same
# ClusterMetrics.TargetDataset.
#
# Input (from ParseableConfig):
#   metrics:
#     clusterMetrics:
#       enabled: true
#       targetDataset: pai-cluster-metrics
#       namespaceSelector:
#         mode: include
#         namespaces: [demo]
#     scrapeConfigs:
#       - name: app metrics
#         uri: /metrics
#         port: 8080
#         targetDataset: pai-app-metrics
#         namespaceSelector:
#           mode: include
#           namespaces: [demo]
#   events:
#     enabled: true
#     targetDataset: pai-events
#     namespaceSelector:
#       mode: include
#       namespaces: [demo]
#
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: pai-metrics-events-collector
  namespace: otel-operator
spec:
  mode: deployment
  config:
    receivers:
      # Cluster-level object state (deployments, pods, nodes, etc.)
      k8s_cluster:
        collection_interval: 30s
        namespaces: [demo]

      # One prometheus receiver per ScrapeConfigs[] entry, with Kubernetes pod SD.
      prometheus/app-metrics:
        config:
          scrape_configs:
            - job_name: app-metrics
              scrape_interval: 30s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [demo]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  action: keep
                  regex: "8080"
                - source_labels: [__meta_kubernetes_pod_ip]
                  action: replace
                  target_label: __address__
                  replacement: "${1}:8080"

      # Kubernetes events
      k8sobjects:
        objects:
          - name: events
            mode: watch
            namespaces: [demo]

    processors:
      batch: {}

    exporters:
      otlphttp/clustermetrics:
        endpoint: http://<YOUR_PARSEABLE_ENDPOINT>:8010
        headers:
          Authorization: "Basic <base64-encoded>"
          X-P-Log-Source: otel-metrics
          X-P-Stream: pai-cluster-metrics

      otlphttp/metrics_app-metrics:
        endpoint: http://<YOUR_PARSEABLE_ENDPOINT>:8010
        headers:
          Authorization: "Basic <base64-encoded>"
          X-P-Log-Source: otel-metrics
          X-P-Stream: pai-app-metrics

      otlphttp/events:
        endpoint: http://<YOUR_PARSEABLE_ENDPOINT>:8010
        headers:
          Authorization: "Basic <base64-encoded>"
          X-P-Log-Source: otel-logs
          X-P-Stream: pai-events

    service:
      pipelines:
        metrics/cluster:
          receivers: [k8s_cluster]
          processors: [batch]
          exporters: [otlphttp/clustermetrics]

        metrics/app-metrics:
          receivers: [prometheus/app-metrics]
          processors: [batch]
          exporters: [otlphttp/metrics_app-metrics]

        logs:
          receivers: [k8sobjects]
          processors: [batch]
          exporters: [otlphttp/events]
