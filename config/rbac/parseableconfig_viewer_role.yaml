# permissions for end users to view parseableconfigs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pai
    app.kubernetes.io/managed-by: kustomize
  name: parseableconfig-viewer-role
rules:
- apiGroups:
  - observability.parseable.com
  resources:
  - parseableconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - observability.parseable.com
  resources:
  - parseableconfigs/status
  verbs:
  - get
